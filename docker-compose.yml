version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8090:8090"
    environment:
      - PORT=8090
      - MAX_UPLOAD_SIZE=52428800
      - TEMP_DIR=/tmp/optipix
      - CORS_ORIGIN=*
      - SVGO_PATH=svgo
      - MAX_CONCURRENCY=4
    volumes:
      - backend-temp:/tmp/optipix
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-temp:
