version: "3.8"

services:
  backend:
    build:
      context: ./backend
      target: api
    ports:
      - "8090:8090"
    environment:
      - PORT=8090
      - MAX_UPLOAD_SIZE=52428800
      - TEMP_DIR=/tmp/optipix
      - CORS_ORIGIN=*
      - SVGO_PATH=svgo
      - MAX_CONCURRENCY=4
    volumes:
      - backend-temp:/tmp/optipix
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: base
    command: npm run dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  cli-worker:
    build:
      context: ./backend
      target: cli
    # Pasamos argumentos directamente al ENTRYPOINT del contenedor
    command: ["-input", "/images", "-output", "/optimized", "-format", "avif", "-quality", "75"]
    profiles: ["cli"] # Lo ocultamos para que no arranque con "docker-compose up"
    volumes:
      # Montas tu carpeta local con imágenes al contenedor
      - ./sample-images/input:/images
      - ./sample-images/output:/optimized
      # Opcional: montar el archivo de estado
      - ./sample-images/.optipix-state.json:/app/.optipix-state.json

volumes:
  backend-temp:
